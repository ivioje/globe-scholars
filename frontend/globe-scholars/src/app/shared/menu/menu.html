<div class="container">
    <div class="logo">
         <h1>Globe-Scholars</h1>
    </div>

    <div class="menu">
        <a routerLink="/" routerLinkActive="active">Home</a>
        <a routerLink="/about" routerLinkActive="active">About</a>
        <a routerLink="/scholars" routerLinkActive="active">Scholars</a>
        <a routerLink="/repository" routerLinkActive="active">Repository</a>

        <div class="menu-btns">
            @if(authService.isLoggedIn && userImage){
              <div class="profileImage" routerLink="/profile" style="cursor: pointer;">
                    <img [src]="userImage"  alt=""/>
                </div>
            }
            <button class="theme-toggle" (click)="themeService.toggle()" title="Toggle theme">
                {{ themeService.isDark ? 'Light' : 'Dark' }}
            </button>
            <button>
                @if(!authService.isLoggedIn) {
                    <a routerLink="/login">LOGIN</a>
                } @else {
                    <a routerLink="/upload">UPLOAD</a>
                }
            </button>
        </div>
    </div>
</div>
